<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            padding: 20px;
        }
        
        .game-container {
            text-align: center;
        }
        
        canvas {
            border: 2px solid #333;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .game-info {
            margin: 20px 0;
            font-size: 18px;
        }
        
        .controls {
            margin: 20px 0;
            font-size: 16px;
            color: #555;
        }
        
        .score-display {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
            color: #2c3e50;
        }
        
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px 5px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .difficulty-selector {
            margin: 20px 0;
        }
        
        select {
            padding: 8px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Snake Game</h1>
        
        <div class="difficulty-selector">
            <label for="difficulty">Difficulty: </label>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        
        <div class="score-display">
            Score: <span id="score">0</span>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="game-info">
            <p>Use arrow keys or WASD to control the snake</p>
            <p>Eat the food (🍎) to grow longer and increase your score!</p>
        </div>
        
        <div class="controls">
            <button id="startBtn">Start Game</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset Game</button>
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p id="finalScore">Your score: 0</p>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>
    
    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverElement = document.getElementById('gameOver');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const restartBtn = document.getElementById('restartBtn');
        const difficultySelect = document.getElementById('difficulty');
        
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let gameSpeed = 150;
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoopId = null;
        
        // Initialize game
        function initGame() {
            snake = [
                {x: 200, y: 200},
                {x: 180, y: 200},
                {x: 160, y: 200}
            ];
            
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            scoreElement.textContent = score;
            gameOverElement.style.display = 'none';
            
            generateFood();
            drawGame();
        }
        
        // Generate food at random position
        function generateFood() {
            const gridSize = 20;
            const maxX = canvas.width / gridSize - 1;
            const maxY = canvas.height / gridSize - 1;
            
            food = {
                x: Math.floor(Math.random() * maxX) * gridSize,
                y: Math.floor(Math.random() * maxY) * gridSize
            };
            
            // Make sure food doesn't spawn on snake
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    return generateFood();
                }
            }
        }
        
        // Draw the game
        function drawGame() {
            // Clear canvas
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = '#eee';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < canvas.width; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 20) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            
            // Draw snake
            ctx.fillStyle = '#4CAF50';
            for (let segment of snake) {
                ctx.fillRect(segment.x, segment.y, 20, 20);
                ctx.strokeStyle = '#2E7D32';
                ctx.strokeRect(segment.x, segment.y, 20, 20);
            }
            
            // Draw head differently
            if (snake.length > 0) {
                ctx.fillStyle = '#2E7D32';
                ctx.fillRect(snake[0].x, snake[0].y, 20, 20);
            }
            
            // Draw food
            ctx.fillStyle = '#FF5252';
            ctx.beginPath();
            ctx.arc(food.x + 10, food.y + 10, 10, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Update game state
        function updateGame() {
            if (gamePaused) return;
            
            direction = nextDirection;
            
            // Move snake
            const head = {x: snake[0].x, y: snake[0].y};
            
            switch(direction) {
                case 'up':
                    head.y -= 20;
                    break;
                case 'down':
                    head.y += 20;
                    break;
                case 'left':
                    head.x -= 20;
                    break;
                case 'right':
                    head.x += 20;
                    break;
            }
            
            // Check boundaries
            if (head.x < 0 || head.x >= canvas.width || 
                head.y < 0 || head.y >= canvas.height) {
                gameOver();
                return;
            }
            
            // Check self collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }
            
            // Add new head
            snake.unshift(head);
            
            // Check if snake ate food
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreElement.textContent = score;
                generateFood();
            } else {
                // Remove tail if no food eaten
                snake.pop();
            }
            
            drawGame();
        }
        
        // Game over
        function gameOver() {
            gameRunning = false;
            finalScoreElement.textContent = `Your score: ${score}`;
            gameOverElement.style.display = 'block';
            
            if (gameLoopId) {
                clearInterval(gameLoopId);
                gameLoopId = null;
            }
        }
        
        // Start game
        function startGame() {
            if (gameRunning) return;
            
            gameRunning = true;
            gamePaused = false;
            initGame();
            gameLoopId = setInterval(updateGame, gameSpeed);
        }
        
        // Reset game
        function resetGame() {
            if (gameLoopId) {
                clearInterval(gameLoopId);
                gameLoopId = null;
            }
            gameRunning = false;
            gamePaused = false;
            initGame();
        }
        
        // Pause game
        function togglePause() {
            if (!gameRunning) return;
            
            gamePaused = !gamePaused;
            
            if (gamePaused) {
                pauseBtn.textContent = 'Resume';
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Paused', canvas.width/2, canvas.height/2);
                ctx.textAlign = 'left';
            } else {
                pauseBtn.textContent = 'Pause';
                drawGame();
            }
        }
        
        // Update speed based on difficulty
        function updateDifficulty() {
            const difficulty = difficultySelect.value;
            
            switch(difficulty) {
                case 'easy':
                    gameSpeed = 200;
                    break;
                case 'medium':
                    gameSpeed = 150;
                    break;
                case 'hard':
                    gameSpeed = 100;
                    break;
            }
            
            // Restart game with new speed if running
            if (gameRunning) {
                clearInterval(gameLoopId);
                gameLoopId = setInterval(updateGame, gameSpeed);
            }
        }
        
        // Event listeners
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        resetBtn.addEventListener('click', resetGame);
        restartBtn.addEventListener('click', () => {
            gameOverElement.style.display = 'none';
            resetGame();
            startGame();
        });
        
        difficultySelect.addEventListener('change', updateDifficulty);
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning && (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W')) {
                startGame();
            }
            
            // Prevent opposite direction movement
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction !== 'down') nextDirection = 'up';
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction !== 'up') nextDirection = 'down';
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction !== 'right') nextDirection = 'left';
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction !== 'left') nextDirection = 'right';
                    break;
                case ' ': // Space bar to pause/resume
                    e.preventDefault();
                    togglePause();
                    break;
            }
        });
        
        // Initial draw
        drawGame();
    </script>
</body>
</html>
